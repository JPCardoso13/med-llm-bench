# configs/medcase_reasoning.yaml
dataset: "zou-lab/MedCaseReasoning"
task_type: "generation"
schema: "GenerativeSample"
eval_split: "test"
fewshot_split: "train"

mapping:
  # 'id' is omitted; the YamlLoader will hash the question text
  question: "case_prompt"
  answer: "diagnostic_reasoning"
  metadata:
    pmcid: "pmcid"
    title: "title"
    journal: "journal"
    article_link: "article_link"