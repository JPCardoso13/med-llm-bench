schema_version: 1

profile_id: cognitive.mcq
scope: cognitive
task_type: mcq
group_by:
  - task_name
  - dataset
  - model_id
  - backend

enabled: true

mcq:
  enabled: true
  accuracy:
    enabled: true
  precision:
    enabled: true
    average: macro
  recall:
    enabled: true
    average: macro
  f1:
    enabled: true
    average: macro
  parsing:
    enabled: true

semantic_similarity:
  enabled: false

llm_judge:
  enabled: false

quality_checks:
  fail_on_missing_ref_fields: false
  warn_on_parse_failures: true
  warn_on_extraction_ambiguity: true
